<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MfT Arcade — Play-for-Impact Gaming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080f;
    --surface: #12121f;
    --surface2: #1a1a2e;
    --border: #2a2a4e;
    --accent: #9b59b6;
    --accent-glow: #c39bd3;
    --gold: #f1c40f;
    --green: #2ecc40;
    --red: #e74c3c;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --font-display: 'Cinzel', serif;
    --font-body: 'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* --- HERO --- */
  .hero {
    position: relative;
    height: 420px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('assets/hero-bg.webp') center/cover no-repeat;
    filter: brightness(0.5);
    z-index: 0;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent 40%, var(--bg) 100%);
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold) 0%, #e67e22 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 2px 8px rgba(241,196,15,0.3));
    margin-bottom: 8px;
  }

  .hero .subtitle {
    font-size: 20px;
    color: var(--accent-glow);
    font-weight: 500;
    letter-spacing: 2px;
  }

  .hero .powered-by {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-dim);
  }

  .hero .powered-by span {
    color: var(--green);
    font-weight: 600;
  }

  /* --- TOP BAR --- */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: rgba(8, 8, 15, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .top-bar .logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
  }

  .wallet-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mft-balance {
    font-size: 14px;
    color: var(--green);
    font-weight: 600;
    padding: 6px 12px;
    background: rgba(46, 204, 64, 0.1);
    border: 1px solid rgba(46, 204, 64, 0.2);
    border-radius: 20px;
  }

  .wallet-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-body);
  }
  .wallet-btn:hover { background: #8e44ad; transform: translateY(-1px); }
  .wallet-btn.connected { background: var(--surface2); border: 1px solid var(--border); }

  /* --- ACCESS GATE --- */
  .gate-banner {
    text-align: center;
    padding: 20px;
    margin: 0 24px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .gate-banner.granted {
    border-color: rgba(46, 204, 64, 0.3);
    background: rgba(46, 204, 64, 0.05);
  }
  .gate-banner.denied {
    border-color: rgba(231, 76, 60, 0.3);
    background: rgba(231, 76, 60, 0.05);
  }
  .gate-banner h3 { margin-bottom: 8px; }
  .gate-banner p { color: var(--text-dim); font-size: 14px; }

  /* --- GAME GRID --- */
  .section-title {
    font-family: var(--font-display);
    font-size: 28px;
    padding: 0 24px;
    margin-bottom: 20px;
    color: var(--text);
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    padding: 0 24px 60px;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
  }
  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(155, 89, 182, 0.15);
  }
  .game-card.locked {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  .game-card .thumb {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .game-card .thumb-placeholder {
    width: 100%;
    height: 180px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .game-card .info {
    padding: 16px;
  }

  .game-card .info h3 {
    font-family: var(--font-display);
    font-size: 20px;
    margin-bottom: 6px;
  }

  .game-card .info p {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .game-card .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag.live { background: rgba(46, 204, 64, 0.15); color: var(--green); }
  .tag.coming-soon { background: rgba(241, 196, 15, 0.15); color: var(--gold); }
  .tag.wager { background: rgba(155, 89, 182, 0.15); color: var(--accent-glow); }
  .tag.pvp { background: rgba(231, 76, 60, 0.15); color: var(--red); }
  .tag.campaign { background: rgba(52, 152, 219, 0.15); color: #3498db; }

  .lock-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    border-radius: 16px;
  }

  /* --- FOOTER --- */
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent-glow); text-decoration: none; }

  /* --- COMING SOON PLACEHOLDER --- */
  .empty-slot {
    border: 2px dashed var(--border);
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 280px;
    border-radius: 16px;
    color: var(--text-dim);
    cursor: default;
  }
  .empty-slot span { font-size: 36px; margin-bottom: 8px; }
  .empty-slot p { font-size: 14px; }

  /* --- RESPONSIVE --- */
  @media (max-width: 600px) {
    .hero h1 { font-size: 42px; }
    .hero { height: 300px; }
    .games-grid { grid-template-columns: 1fr; padding: 0 12px 40px; }
    .section-title { padding: 0 12px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">MfT ARCADE</div>
  <div class="wallet-area">
    <div class="mft-balance" id="mftBalance" style="display:none;">0 MfT</div>
    <button class="wallet-btn" id="walletBtn" onclick="handleWallet()">Connect Wallet</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>MfT ARCADE</h1>
    <div class="subtitle">Play-for-Impact Gaming</div>
    <div class="powered-by">Powered by <span>$MfT</span> on Base</div>
  </div>
</div>

<!-- ACCESS GATE -->
<div id="gateBanner" class="gate-banner" style="display:none;"></div>

<!-- GAMES -->
<h2 class="section-title">Games</h2>
<div class="games-grid" id="gamesGrid">
  <!-- Populated by JS -->
</div>

<!-- FOOTER -->
<div class="footer">
  <p>MfT Arcade &mdash; <a href="https://memefortrees.com">memefortrees.com</a></p>
  <p style="margin-top:4px;">Powered by $MfT on Base &bull; All games run peer-to-peer &bull; Zero server costs</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<script src="js/wallet.js"></script>
<script>

let hasAccess = false;

// Mode icons
const MODE_ICONS = {
  'campaign': { label: 'Campaign', cls: 'campaign' },
  'online-pvp': { label: 'PvP', cls: 'pvp' },
  'local-mp': { label: 'Local Co-op', cls: 'campaign' },
};

async function handleWallet() {
  const btn = document.getElementById('walletBtn');
  try {
    btn.textContent = 'Connecting...';
    btn.disabled = true;
    const addr = await MftWallet.connect();
    btn.textContent = MftWallet.shortAddress(addr);
    btn.classList.add('connected');
    btn.disabled = false;

    // Show MfT balance
    const bal = await MftWallet.getMftBalance();
    const balEl = document.getElementById('mftBalance');
    const formatted = parseFloat(bal).toLocaleString(undefined, { maximumFractionDigits: 0 });
    balEl.textContent = `${formatted} MfT`;
    balEl.style.display = 'block';

    // Check NFT access
    await checkGate();
  } catch (e) {
    btn.textContent = 'Connect Wallet';
    btn.disabled = false;
    btn.classList.remove('connected');
    console.error(e);
  }
}

async function checkGate() {
  const banner = document.getElementById('gateBanner');
  const config = await MftWallet.loadConfig();

  // If no NFT contracts configured, access is open
  if (config.nftContracts.length === 0) {
    hasAccess = true;
    banner.style.display = 'block';
    banner.className = 'gate-banner granted';
    banner.innerHTML = `<h3 style="color:var(--green);">Arcade Open!</h3>
      <p>Welcome to the MfT Arcade. Pick a game and play!</p>`;
    renderGames();
    return;
  }

  hasAccess = await MftWallet.checkAccess();
  banner.style.display = 'block';

  if (hasAccess) {
    banner.className = 'gate-banner granted';
    banner.innerHTML = `<h3 style="color:var(--green);">Access Granted</h3>
      <p>Your NFT was verified. All games are unlocked!</p>`;
  } else {
    banner.className = 'gate-banner denied';
    banner.innerHTML = `<h3 style="color:var(--red);">NFT Required</h3>
      <p>You need an MfT NFT to access the arcade. Check the marketplace or join the community!</p>`;
  }
  renderGames();
}

async function renderGames() {
  const config = await MftWallet.loadConfig();
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';

  for (const game of config.games) {
    const card = document.createElement('div');
    const isLocked = !hasAccess && MftWallet.isConnected();
    card.className = 'game-card' + (isLocked ? ' locked' : '');

    // Thumbnail
    let thumbHtml;
    if (game.thumbnail) {
      thumbHtml = `<img class="thumb" src="${game.thumbnail}" alt="${game.name}" onerror="this.outerHTML='<div class=thumb-placeholder>?</div>'">`;
    } else {
      thumbHtml = `<div class="thumb-placeholder">?</div>`;
    }

    // Tags
    let tags = '';
    if (game.status === 'live') tags += '<span class="tag live">Live</span>';
    else tags += '<span class="tag coming-soon">Coming Soon</span>';
    if (game.wager) tags += '<span class="tag wager">MfT Wager</span>';
    if (game.modes) {
      for (const mode of game.modes) {
        const m = MODE_ICONS[mode];
        if (m) tags += `<span class="tag ${m.cls}">${m.label}</span>`;
      }
    }

    card.innerHTML = `
      ${thumbHtml}
      <div class="info">
        <h3>${game.name}</h3>
        <p>${game.description || ''}</p>
        <div class="tags">${tags}</div>
      </div>
      ${isLocked ? '<div class="lock-overlay">&#128274;</div>' : ''}
    `;

    if (!isLocked && game.status === 'live') {
      card.onclick = () => window.location.href = game.path;
    }

    grid.appendChild(card);
  }

  // Empty slots for upcoming games
  for (let i = 0; i < 3; i++) {
    const slot = document.createElement('div');
    slot.className = 'empty-slot';
    slot.innerHTML = `<span>+</span><p>New game coming soon</p>`;
    grid.appendChild(slot);
  }
}

// Init
(async () => {
  await MftWallet.loadConfig();
  renderGames();

  // Auto-connect if wallet was previously connected
  if (window.ethereum && window.ethereum.selectedAddress) {
    handleWallet();
  }
})();

</script>
</body>
</html>
